<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<!-- tokens -> base -> components: fixed load order, source of truth for all styling. See docs/Console_Workflow.md. -->
<link rel="stylesheet" href="css/tokens.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>

<div class="app">

  <!-- ================== SIDEBAR ================== -->
  <!-- Markup reused verbatim from prototypes/console_today_prototype.html, plus data-route
       attributes for the router. Nothing here should be redrawn from description. -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">C</div>
      <div>
        <div class="brand-name">Console</div>
        <div class="brand-meta">offline · v0.1</div>
      </div>
    </div>

    <div class="nav-group-label">Workspace</div>
    <div class="nav-item" data-route="today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2"/></svg>
      Today <span class="nav-count">0</span>
    </div>
    <div class="nav-item" data-route="tasks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m9 12 2 2 4-4"/></svg>
      Tasks <span class="nav-count">0</span>
    </div>
    <div class="nav-item" data-route="schedule">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M9 3v4M15 3v4"/></svg>
      Schedule <span class="nav-count">0</span>
    </div>
    <div class="nav-item" data-route="habits">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
      Habits <span class="nav-count">0</span>
    </div>
    <div class="nav-item" data-route="finance">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/></svg>
      Finance <span class="nav-count">0</span>
    </div>
    <div class="nav-item" data-route="focus">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2M9 2h6"/></svg>
      Focus <span class="nav-count">0</span>
    </div>

    <div class="nav-group-label">Insight</div>
    <div class="nav-item" data-route="analytics">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 3v18h18"/><path d="M7 14l3-3 4 4 6-7"/></svg>
      Analytics
    </div>
    <div class="nav-item" data-route="insights">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1V18h6v-1.2c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2z"/></svg>
      Insights <span class="nav-count">0</span>
    </div>
    <div class="nav-item" data-route="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3h.1a1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 1 1.5h.1a1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8v.1a1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg>
      Settings
    </div>

    <div class="sidebar-footer">
      <span class="ondisk"></span>
      <span>saved · IndexedDB</span>
    </div>
  </aside>

  <!-- ================== MAIN ================== -->
  <main class="main">

    <!-- topbar -->
    <div class="topbar">
      <div class="breadcrumb">
        workspace<span class="sep">/</span><span class="here">today</span>
      </div>
      <div class="topbar-spacer"></div>
      <!-- Universal range filter (Phase 7 / Analytics) — visual-only through Phase 6 (js/app.js's
           wireTopbarSegmented comment said as much since Phase 1); wired for real range-filtering
           here, but only Analytics reads the persisted value. See docs/phase_prompts/
           phase_7_analytics.md Design Decision #2. -->
      <div class="range-filter">
        <div class="segmented" id="range-segmented">
          <button data-range="7d">7d</button>
          <button data-range="30d" class="active">30d</button>
          <button data-range="90d">90d</button>
          <button data-range="all">all</button>
          <button data-range="custom">custom</button>
        </div>
        <div class="range-popover" id="range-popover" hidden>
          <div class="modal-field"><label>From</label><input type="date" class="input" id="range-start"></div>
          <div class="modal-field"><label>To</label><input type="date" class="input" id="range-end"></div>
          <button class="btn accent" id="range-apply">Apply</button>
        </div>
      </div>
      <button class="cmd-trigger">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
        <span>Search or run command…</span>
        <span class="kbd">⌘ K</span>
      </button>
      <div class="theme-toggle" id="ttoggle">
        <button class="active" data-theme="light">light</button>
        <button data-theme="dark">dark</button>
      </div>
    </div>

    <!-- content: each module's init(container) renders into #app-content -->
    <div class="content">
      <div class="content-inner" id="app-content"></div>
    </div>
  </main>

  <!-- FLOATING ACTIVE TIMER — container always present, hidden until a real focus session
       exists (Phase 6). See phase_1_foundation.md. -->
  <div class="floating-timer" id="floating-timer" hidden>
    <div class="ftindicator"></div>
    <div class="ftcontent">
      <div class="ftmode">—</div>
      <div class="fttitle">—</div>
    </div>
    <div class="fttime">00:00</div>
    <div class="ftctrls">
      <button data-act="ft-pause">Pause</button>
      <button data-act="ft-end">End</button>
    </div>
  </div>

  <!-- COMMAND PALETTE OVERLAY — not in any prototype (only the static .cmd-trigger button was
       shown); .palette-overlay/.palette markup and behavior built fresh for Phase 1. -->
  <div class="palette-overlay" id="cmd-overlay" hidden>
    <div class="palette">
      <div class="pinput">
        <span class="prompt">›</span>
        <input type="text" id="cmd-input" placeholder="Search or run a command…" autocomplete="off">
      </div>
      <div class="pres" id="cmd-results"></div>
    </div>
  </div>

</div>

<!-- Classic scripts on purpose, not type="module" — ES module graphs are blocked by CORS
     under file:// in several browsers, and "opens from file://" is non-negotiable.
     Load order matters: lib/db first, then modules (which reference Console.lib and
     Console.db at init time, not at parse time, but keeping order consistent avoids surprises),
     then the shell singletons, then app.js last to boot everything. -->
<script src="js/db.js"></script>
<script src="js/lib/format.js"></script>
<script src="js/lib/capture.js"></script>
<script src="js/lib/habits.js"></script>
<script src="js/lib/stub-module.js"></script>
<script src="js/modules/today/index.js"></script>
<script src="js/modules/tasks/index.js"></script>
<script src="js/modules/schedule/index.js"></script>
<script src="js/modules/habits/index.js"></script>
<script src="js/modules/finance/index.js"></script>
<script src="js/modules/focus/index.js"></script>
<script src="js/modules/analytics/index.js"></script>
<script src="js/modules/insights/index.js"></script>
<script src="js/modules/settings/index.js"></script>
<script src="js/theme.js"></script>
<script src="js/router.js"></script>
<script src="js/palette.js"></script>
<script src="js/app.js"></script>
</body>
</html>
